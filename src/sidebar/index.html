<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wadjet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <header class="app__header">
        <h1 class="app__title">Wadjet</h1>
        <div class="app__case" id="active-case">
          <span class="app__case-name" id="active-case-name">No active case</span>
          <span class="app__case-status" id="active-case-status" hidden></span>
        </div>
      </header>

      <section class="toolbar" aria-label="Case actions">
        <button type="button" id="btn-new-case" class="btn btn--primary">New case</button>
        <button type="button" id="btn-close-case" class="btn" disabled>Close case</button>
      </section>

      <section class="cases" aria-label="Cases">
        <h2 class="section__title">Cases</h2>
        <ul class="cases__list" id="cases-list"></ul>
        <p class="empty" id="cases-empty">No cases yet. Create one to begin.</p>
      </section>

      <section class="timeline" aria-label="Case timeline">
        <h2 class="section__title">Timeline</h2>
        <ul class="timeline__list" id="timeline-list"></ul>
        <p class="empty" id="timeline-empty">Open a case to see its timeline.</p>
      </section>

      <section class="composer" aria-label="Add note" id="composer" hidden>
        <label class="composer__label" for="note-input">Add note</label>
        <textarea
          id="note-input"
          class="composer__input"
          rows="2"
          placeholder="Observation, hypothesis, next step…"
        ></textarea>
        <input
          id="note-tags"
          class="composer__tags"
          type="text"
          placeholder="tags, comma, separated"
        />
        <button type="button" id="btn-add-note" class="btn btn--primary">Add to case</button>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
