<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img"
  aria-label="Wadjet — case-bound investigation console for security analysts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111d34" />
      <stop offset="1" stop-color="#080d1a" />
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="26%" r="60%">
      <stop offset="0" stop-color="#e8b24c" stop-opacity="0.18" />
      <stop offset="1" stop-color="#e8b24c" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)" />
  <rect width="1200" height="300" fill="url(#glow)" />
  <line x1="0" y1="299" x2="1200" y2="299" stroke="#e8b24c" stroke-opacity="0.5" stroke-width="2" />

  <!-- uraeus mark -->
  <g transform="translate(78 72) scale(2.1)">
    <circle cx="32" cy="32" r="29" fill="none" stroke="#4ccec7" stroke-width="1.6" opacity="0.6" />
    <path
      d="M32 47 C24 46 14 40 10 30 C8 24 10 18 15 16 C19 14 24 15 27 17 L37 17 C40 15 45 14 49 16 C54 18 56 24 54 30 C50 40 40 46 32 47 Z"
      fill="#e8b24c" />
    <path d="M26 29 L32 34 L38 29" fill="none" stroke="#080d1a" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round" opacity="0.55" />
    <path d="M32 9 C37 9 40 12 40 16 C40 20 36 22 32 22 C28 22 24 20 24 16 C24 12 27 9 32 9 Z"
      fill="#e8b24c" />
    <ellipse cx="28.4" cy="15.4" rx="1.5" ry="2" fill="#080d1a" />
    <ellipse cx="35.6" cy="15.4" rx="1.5" ry="2" fill="#080d1a" />
  </g>

  <text x="278" y="140" fill="#eae5d6" font-family="Georgia, 'Palatino Linotype', serif"
    font-size="76" font-weight="600" letter-spacing="2">Wadjet</text>
  <text x="281" y="182" fill="#aeb8d0" font-family="system-ui, 'Segoe UI', Arial, sans-serif"
    font-size="23">Case-bound investigation console for security analysts</text>

  <g font-family="ui-monospace, Consolas, monospace" font-size="15" fill="#8ea0c4" letter-spacing="1">
    <text x="281" y="228">CAPTURE</text><text x="381" y="228" fill="#5a6a8c">·</text>
    <text x="398" y="228">DECODE</text><text x="488" y="228" fill="#5a6a8c">·</text>
    <text x="505" y="228">ENRICH</text><text x="591" y="228" fill="#5a6a8c">·</text>
    <text x="608" y="228">DETONATE</text><text x="725" y="228" fill="#5a6a8c">·</text>
    <text x="742" y="228">INSPECT</text><text x="836" y="228" fill="#5a6a8c">·</text>
    <text x="853" y="228">EXPORT</text>
  </g>

  <text x="281" y="262" fill="#5c6a88" font-family="ui-monospace, Consolas, monospace"
    font-size="13">Firefox · local-first · no passive telemetry · MPL-2.0</text>
</svg>
